<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novel Agent Clean - 审查台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="review">
  <header class="topbar">
    <div class="brand-block">
      <p class="eyebrow">Novel Agent Clean</p>
      <h1>审查台</h1>
      <p class="lede">把“任务日志”降级成辅助信息，先看待处理问题、待审对象、依赖影响，再决定返工还是继续推进。</p>
    </div>
    <nav class="nav-links">
      <a href="/">项目</a>
      <a href="/workflow">设定与写作</a>
      <a href="/outline">结构台</a>
      <a href="/review" aria-current="page">审查台</a>
    </nav>
  </header>

  <main class="page-grid page-grid-review">
    <section class="panel panel-hero">
      <div class="panel-header">
        <div>
          <p class="eyebrow">总览</p>
          <h2>项目审查摘要</h2>
        </div>
        <div class="actions-row compact">
          <button id="reload-review" class="secondary" type="button">刷新</button>
        </div>
      </div>
      <div id="review-summary"></div>
    </section>

    <section class="panel panel-main">
      <div class="panel-header">
        <div>
          <p class="eyebrow">问题队列</p>
          <h2>当前最值得处理的事项</h2>
        </div>
      </div>
      <div id="review-queue" class="queue-list"></div>
    </section>

    <section class="panel panel-side">
      <div class="panel-header">
        <div>
          <p class="eyebrow">建议动作</p>
          <h2>下一步</h2>
        </div>
      </div>
      <div id="review-actions"></div>
    </section>

    <section class="panel panel-wide">
      <div class="panel-header">
        <div>
          <p class="eyebrow">审查矩阵</p>
          <h2>按对象审，不按接口审</h2>
        </div>
      </div>
      <div id="review-matrix" class="review-grid"></div>
    </section>

    <section class="panel panel-wide">
      <div class="panel-header">
        <div>
          <p class="eyebrow">任务记录</p>
          <h2>最近任务</h2>
        </div>
      </div>
      <div id="review-tasks" class="task-list"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/review-page.js"></script>
</body>
</html>
