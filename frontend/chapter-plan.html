<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novel Agent Clean - 章节计划页面</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="chapter-plan">
  <header class="topbar">
    <div class="brand-block">
      <p class="eyebrow">Novel Agent Clean</p>
      <h1>章节计划页面</h1>
      <p class="lede">这里只展示当前章的完善章节计划。章节级工作与卷级工作分开处理。</p>
    </div>
    <nav class="nav-links">
      <a href="/">项目</a>
      <a href="/workflow">主工作流</a>
      <a href="/outline">总纲页面</a>
      <a href="/volume-outline">卷纲页面</a>
      <a href="/chapter-plan" aria-current="page">章节计划页面</a>
      <a href="/review">审查台</a>
    </nav>
  </header>

  <main class="workspace-layout">
    <aside class="panel workspace-sidebar">
      <div class="panel-header">
        <div>
          <p class="eyebrow">页面信息</p>
          <h2>当前章节</h2>
        </div>
      </div>
      <div id="structure-project-mini"></div>
      <div id="structure-selection"></div>
    </aside>

    <section class="panel workspace-main">
      <div class="panel-header">
        <div>
          <p class="eyebrow">结构工作区</p>
          <h2 id="structure-workspace-title">章节计划页面</h2>
          <p class="muted" id="structure-workspace-subtitle"></p>
        </div>
        <div class="actions-row compact">
          <button id="reload-structure" class="secondary" type="button">刷新</button>
        </div>
      </div>
      <div id="structure-overview" class="stats-grid"></div>
      <div id="structure-workspace"></div>
    </section>

    <aside class="panel workspace-inspector">
      <div class="panel-header">
        <div>
          <p class="eyebrow">结构审查</p>
          <h2>检查点</h2>
        </div>
      </div>
      <div id="structure-inspector"></div>
    </aside>
  </main>

  <script type="module" src="/assets/js/structure-page.js"></script>
</body>
</html>
