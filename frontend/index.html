<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novel Agent Clean - 项目台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="index">
  <header class="topbar">
    <div class="brand-block">
      <p class="eyebrow">Novel Agent Clean</p>
      <h1>项目台</h1>
      <p class="lede">把小说工程先立起来，再决定是去设定、结构还是审查，不再让作者直接面对一排接口步骤。</p>
    </div>
    <nav class="nav-links">
      <a href="/" aria-current="page">项目</a>
      <a href="/workflow">设定与写作</a>
      <a href="/outline">结构台</a>
      <a href="/review">审查台</a>
    </nav>
  </header>

  <main class="page-grid page-grid-dashboard">
    <section class="panel panel-hero">
      <div class="panel-header">
        <div>
          <p class="eyebrow">项目驾驶舱</p>
          <h2>当前工程</h2>
        </div>
        <div class="actions-row compact">
          <button id="refresh-projects" class="secondary" type="button">刷新项目</button>
          <button id="new-project-mode" class="secondary" type="button">新建模式</button>
        </div>
      </div>
      <div id="project-dashboard"></div>
    </section>

    <section class="panel panel-main">
      <div class="panel-header">
        <div>
          <p class="eyebrow">创建项目</p>
          <h2>新建小说工程</h2>
        </div>
        <p class="muted">按作品定位、规模约束、风格禁忌三层输入，比“把所有字段堆成一大页”更接近真实创作流程。</p>
      </div>
      <form id="project-form" class="wizard-form"></form>
      <div class="actions-row sticky-actions">
        <button class="primary" type="submit" form="project-form">创建并设为当前项目</button>
      </div>
    </section>

    <section class="panel panel-side">
      <div class="panel-header">
        <div>
          <p class="eyebrow">当前选择</p>
          <h2>活动项目</h2>
        </div>
      </div>
      <div id="selected-project-summary"></div>
    </section>

    <section class="panel panel-wide">
      <div class="panel-header">
        <div>
          <p class="eyebrow">项目列表</p>
          <h2>全部工程</h2>
        </div>
        <p class="muted">这里展示的是“作品卡片”，不是后端对象快照。先选项目，再进具体工作台。</p>
      </div>
      <div id="project-list" class="card-list"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/index-page.js"></script>
</body>
</html>
